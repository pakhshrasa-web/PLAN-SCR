name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf
        version = 0.1.5
        requirements = python3,kivy==2.2.1,kivymd==1.1.1,pyjnius==1.6.1,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests
        orientation = portrait
        fullscreen = 0
        python3 = True

        [buildozer]
        log_level = 4
        warn_on_root = 1

        [buildozer:android]
        android.sdk_path = /home/user/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/user/.buildozer/android/platform/android-ndk-r25b
        android.ndk = 25b
        android.api = 33
        android.minapi = 21
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False

        android.gradle_version = 8.4
        android.manifest.extra = <application android:enableOnBackInvokedCallback="true" />

        android.version_code = 1
        android.debug = False
        android.release = True
        EOF
        echo "✅ buildozer.spec created"

    - name: Create initial json files
      run: |
        mkdir -p data
        
        cat > data/definitions.json << 'EOF'
        {
          "agents": [],
          "routes": [],
          "customers": []
        }
        EOF
        
        cat > data/settings.json << 'EOF'
        {
          "supervision_rate": 0.3,
          "conversion_rate": 0.25,
          "avg_invoice_amount": 1000000,
          "target_amount": 50000000,
          "target_count": 100,
          "target_invoice_count": 20,
          "target_customer_count": 50,
          "target_new_customer_count": 10,
          "target_cash_sales": 30000000,
          "target_credit_sales": 20000000,
          "work_start_time": "08:00",
          "first_visit_time": "09:00",
          "min_daily_hours": 6,
          "first_customer_of_route": ""
        }
        EOF
        
        cat > data/users.json << 'EOF'
        {
          "users": []
        }
        EOF
        
        cat > data/codes.json << 'EOF'
        {
          "codes": []
        }
        EOF
        
        cat > data/admin_password.json << 'EOF'
        {
          "hashed_password": ""
        }
        EOF
        
        cat > data/daily_log.json << 'EOF'
        {}
        EOF
        echo "✅ JSON files created"

    - name: Copy fonts and data to build directory
      run: |
        mkdir -p .buildozer/android/app/fonts
        mkdir -p .buildozer/android/app/data
        
        cp -v fonts/*.ttf .buildozer/android/app/fonts/ 2>/dev/null || echo "خطا در کپی فونت‌ها"
        cp -v data/*.json .buildozer/android/app/data/ 2>/dev/null || echo "خطا در کپی داده‌ها"

    - name: Update version and version_code for auto-update
      run: |
        # آپدیت version_code با شماره بیلد
        sed -i "s/android.version_code = [0-9]*/android.version_code = ${{ github.run_number }}/" buildozer.spec
        
        # آپدیت version با شماره بیلد برای آپدیت خودکار
        sed -i "s/version = .*/version = ${{ github.run_number }}/" buildozer.spec
        
        echo "✅ Version set to: ${{ github.run_number }}"
        echo "✅ Version Code set to: ${{ github.run_number }}"
        echo "📱 APK will auto-update previous version"

    - name: Restore Keystore from Secrets
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        mkdir -p .buildozer/android/platform/
        cp keystore.jks .buildozer/android/platform/planandroid.keystore

    - name: Update buildozer.spec with keystore paths
      run: |
        echo "" >> buildozer.spec
        echo "# Keystore configuration" >> buildozer.spec
        echo "android.keystore = planandroid.keystore" >> buildozer.spec
        echo "android.keystore_password = ${{ secrets.KEYSTORE_PASSWORD }}" >> buildozer.spec
        echo "android.keystore_alias = ${{ secrets.KEY_ALIAS }}" >> buildozer.spec
        echo "android.keystore_alias_password = ${{ secrets.KEY_PASSWORD }}" >> buildozer.spec
        echo "✅ buildozer.spec updated with keystore info"

    - name: Build APK with Buildozer Action
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        workdir: .
        buildozer_cmd: buildozer android release

    - name: Convert AAB to Signed APK (if needed)
      run: |
        # اگر فایل AAB وجود داشت به APK تبدیل کن
        if [ -f bin/*.aab ]; then
          AAB_FILE=$(find . -name "*.aab" -type f | head -n 1)
          echo "📦 Found AAB: $AAB_FILE"
          
          wget -q https://github.com/google/bundletool/releases/download/1.17.0/bundletool-all-1.17.0.jar -O bundletool.jar
          
          java -jar bundletool.jar build-apks \
            --bundle="$AAB_FILE" \
            --output=app.apks \
            --mode=universal \
            --ks=keystore.jks \
            --ks-pass=pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias=${{ secrets.KEY_ALIAS }} \
            --key-pass=pass:${{ secrets.KEY_PASSWORD }} \
            --overwrite
          
          unzip -o app.apks -d apk_output
          mkdir -p bin
          cp apk_output/universal.apk bin/app-release.apk
          echo "✅ APK created successfully from AAB"
        fi

    - name: Verify APK exists
      run: |
        echo "📱 Checking APK files:"
        ls -la bin/ || echo "No APK found!"
        if [ -f bin/*.apk ]; then
          echo "✅ APK found successfully!"
        else
          echo "❌ No APK found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
