name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev \
          python3-pip
        sudo apt-get clean
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython virtualenv
    
    - name: Install python-for-android
      run: |
        pip install python-for-android==2024.1.21
    
    - name: Build APK with p4a
      run: |
        p4a apk \
          --private . \
          --package=org.pakhshrasa.planandroid \
          --name="Plan Android" \
          --version=1.0.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,kivymd,pyjnius,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests,plyer \
          --android-api=34 \
          --ndk-api=21 \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --debug \
          --enable-onbackinvokedcallback \
          --sdk-dir=/usr/local/lib/android/sdk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: planandroid-*.apk
        retention-days: 30
        if-no-files-found: error
