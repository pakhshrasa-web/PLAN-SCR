name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache \
          libfreetype6-dev libjpeg-dev zlib1g-dev \
          libltdl-dev

    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = PlanAndroid
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf,json
        version = 1.0.0

        requirements = python3==3.10.0,kivy==2.3.0,openpyxl==3.1.2,plyer==2.2,arabic-reshaper==3.0.0,python-bidi==0.4.2,Pillow==10.1.0

        orientation = portrait
        fullscreen = 1

        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
        android.enable_androidx = True
        android.allow_backup = True

        android.gradle_dependencies = 
        android.add_src = fonts/

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Create initial json files
      run: |
        mkdir -p data
        
        cat > data/definitions.json << 'EOF'
        {
          "agents": [],
          "routes": [],
          "customers": []
        }
        EOF
        
        cat > data/settings.json << 'EOF'
        {
          "supervision_rate": 0.3,
          "conversion_rate": 0.25,
          "avg_invoice_amount": 1000000,
          "target_amount": 50000000,
          "target_count": 100,
          "target_invoice_count": 20,
          "target_customer_count": 50,
          "target_new_customer_count": 10,
          "target_cash_sales": 30000000,
          "target_credit_sales": 20000000,
          "work_start_time": "08:00",
          "first_visit_time": "09:00",
          "min_daily_hours": 6,
          "first_customer_of_route": ""
        }
        EOF
        
        cat > data/users.json << 'EOF'
        {
          "users": []
        }
        EOF
        
        cat > data/codes.json << 'EOF'
        {
          "codes": []
        }
        EOF
        
        cat > data/admin_password.json << 'EOF'
        {
          "hashed_password": ""
        }
        EOF
        
        cat > data/daily_log.json << 'EOF'
        {}
        EOF

    - name: Build with Buildozer
      run: |
        echo "y" | buildozer -v android debug
      env:
        CC: gcc
        CXX: g++
        LD: g++

    - name: Find APK
      id: find_apk
      run: |
        APK_FILE=$(find . -name "*.apk" -type f | grep -v "debug" | head -n 1)
        if [ -z "$APK_FILE" ]; then
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
        fi
        echo "APK_FILE=$APK_FILE" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_FILE"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: ${{ steps.find_apk.outputs.APK_FILE }}
        retention-days: 30
        if-no-files-found: error
