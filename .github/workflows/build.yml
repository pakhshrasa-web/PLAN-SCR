name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'  # تغییر به Java 11 برای سازگاری بهتر

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache \
          libfreetype6-dev libjpeg-dev zlib1g-dev

    - name: Install Python packages
      run: |
        # نصب نسخه‌های مشخص برای جلوگیری از مشکل
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.37
        pip install python-for-android==2024.1.7
        echo "Python packages installed successfully"

    - name: Set GCC as default compiler
      run: |
        sudo apt-get install -y gcc g++
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV
        echo "LD=g++" >> $GITHUB_ENV
        sudo ln -sf /usr/bin/gcc /usr/local/bin/cc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/c++
        gcc --version

    - name: Clean NDK 28c (fix for compatibility)
      run: |
        rm -rf ~/.buildozer/android/platform/android-ndk-r28c
        rm -rf .buildozer/android/platform/android-ndk-r28c
        echo "NDK 28c removed to prevent conflicts"

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf
        version = 0.1.5
        requirements = python3==3.10,kivy==2.2.1,kivymd==1.1.1,pyjnius==1.6.2,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests
        orientation = portrait
        fullscreen = 0
        python3 = True
        python_version = 3.10

        [buildozer]
        log_level = 4
        warn_on_root = 1

        [buildozer:android]
        android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b
        android.ndk = 25b
        android.api = 33
        android.minapi = 21
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False

        android.gradle_version = 8.4
        android.manifest.extra = <application android:enableOnBackInvokedCallback="true" />

        android.version_code = 1
        android.debug = False
        android.release = True
        EOF

    - name: Create initial json files
      run: |
        mkdir -p data
        
        cat > data/definitions.json << 'EOF'
        {
          "agents": [],
          "routes": [],
          "customers": []
        }
        EOF
        
        cat > data/settings.json << 'EOF'
        {
          "supervision_rate": 0.3,
          "conversion_rate": 0.25,
          "avg_invoice_amount": 1000000,
          "target_amount": 50000000,
          "target_count": 100,
          "target_invoice_count": 20,
          "target_customer_count": 50,
          "target_new_customer_count": 10,
          "target_cash_sales": 30000000,
          "target_credit_sales": 20000000,
          "work_start_time": "08:00",
          "first_visit_time": "09:00",
          "min_daily_hours": 6,
          "first_customer_of_route": ""
        }
        EOF
        
        cat > data/users.json << 'EOF'
        {
          "users": []
        }
        EOF
        
        cat > data/codes.json << 'EOF'
        {
          "codes": []
        }
        EOF
        
        cat > data/admin_password.json << 'EOF'
        {
          "hashed_password": ""
        }
        EOF
        
        cat > data/daily_log.json << 'EOF'
        {}
        EOF

    - name: Copy fonts and data to build directory
      run: |
        echo "بررسی فایل‌ها قبل از کپی:"
        ls -la fonts/ || echo "پوشه fonts وجود ندارد"
        ls -la screens/ || echo "پوشه screens وجود ندارد"
        ls -la utils/ || echo "پوشه utils وجود ندارد"
        
        mkdir -p .buildozer/android/app/fonts
        mkdir -p .buildozer/android/app/data
        
        echo "کپی فونت‌ها..."
        cp -v fonts/*.ttf .buildozer/android/app/fonts/ 2>/dev/null || echo "خطا در کپی فونت‌ها"
        
        echo "کپی فایل‌های داده..."
        cp -v data/*.json .buildozer/android/app/data/ 2>/dev/null || echo "خطا در کپی داده‌ها"
        
        echo "بررسی فونت‌های کپی شده:"
        ls -la .buildozer/android/app/fonts/ || echo "پوشه fonts خالی است"
        
        echo "بررسی داده‌های کپی شده:"
        ls -la .buildozer/android/app/data/ || echo "پوشه data خالی است"

    - name: Update version_code
      run: |
        echo "قبل از تغییر:"
        grep "android.version_code" buildozer.spec
        sed -i "s/android.version_code = [0-9]*/android.version_code = ${{ github.run_number }}/" buildozer.spec
        echo "بعد از تغییر:"
        grep "android.version_code" buildozer.spec

    - name: Restore Keystore from Secrets
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        echo "Keystore restored successfully"
        ls -la keystore.jks

    - name: Copy keystore to buildozer location
      run: |
        mkdir -p .buildozer/android/platform/
        cp keystore.jks .buildozer/android/platform/planandroid.keystore
        echo "Keystore copied to buildozer location"

    - name: Update buildozer.spec with keystore paths
      run: |
        echo "" >> buildozer.spec
        echo "# Keystore configuration" >> buildozer.spec
        echo "android.keystore = planandroid.keystore" >> buildozer.spec
        echo "android.keystore_password = ${{ secrets.KEYSTORE_PASSWORD }}" >> buildozer.spec
        echo "android.keystore_alias = ${{ secrets.KEY_ALIAS }}" >> buildozer.spec
        echo "android.keystore_alias_password = ${{ secrets.KEY_PASSWORD }}" >> buildozer.spec
        echo "buildozer.spec updated with keystore info"
        cat buildozer.spec | grep "android.keystore"

    - name: Build with Buildozer
      run: |
        # تنظیم محیط برای Python 3.10
        export P4A_PYTHON_VERSION=3.10
        export PYTHON_FOR_ANDROID_PYTHON_VERSION=3.10
        echo "Starting build with Python 3.10..."
        echo "y" | buildozer -v android release
      env:
        CC: gcc
        CXX: g++
        LD: g++
        P4A_PYTHON_VERSION: 3.10
        PYTHON_FOR_ANDROID_PYTHON_VERSION: 3.10

    - name: Convert AAB to Signed APK
      run: |
        AAB_FILE=$(find . -name "*.aab" -type f | head -n 1)
        echo "Found AAB: $AAB_FILE"
        
        wget -q https://github.com/google/bundletool/releases/download/1.17.0/bundletool-all-1.17.0.jar -O bundletool.jar
        
        java -jar bundletool.jar build-apks \
          --bundle="$AAB_FILE" \
          --output=app.apks \
          --mode=universal \
          --ks=keystore.jks \
          --ks-pass=pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --ks-key-alias=${{ secrets.KEY_ALIAS }} \
          --key-pass=pass:${{ secrets.KEY_PASSWORD }} \
          --overwrite
        
        unzip -o app.apks -d apk_output
        mkdir -p bin
        cp apk_output/universal.apk bin/app-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
