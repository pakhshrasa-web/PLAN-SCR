name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache \
          libfreetype6-dev libjpeg-dev zlib1g-dev
    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37
    - name: Set GCC as default compiler
      run: |
        sudo apt-get install -y gcc g++
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV
        echo "LD=g++" >> $GITHUB_ENV
        sudo ln -sf /usr/bin/gcc /usr/local/bin/cc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/c++
        gcc --version
    - name: Clean NDK 28c
      run: |
        rm -rf ~/.buildozer/android/platform/android-ndk-r28c
        rm -rf .buildozer/android/platform/android-ndk-r28c
    - name: Create buildozer.spec (با تنظیمات FileProvider)
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf,json
        version = 0.1.1
        requirements = python3,kivy,openpyxl,arabic-reshaper,python-bidi,requests,Pillow,jdatetime
        orientation = portrait
        fullscreen = 1
        android.add_src = fonts/
        android.gradle_dependencies = implementation 'androidx.core:core:1.12.0'
        android.manifest.extra = 
            <provider android:name="androidx.core.content.FileProvider" 
                      android:authorities="org.pakhshrasa.planandroid.fileprovider" 
                      android:exported="false" 
                      android:grantUriPermissions="true">
                <meta-data android:name="android.support.FILE_PROVIDER_PATHS" 
                           android:resource="@xml/file_paths"/>
            </provider>
        [buildozer]
        log_level = 2
        warn_on_root = 1
        [buildozer:android]
        android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b
        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.archs = armeabi-v7a, arm64-v8a
        android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE, MANAGE_EXTERNAL_STORAGE
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False
        android.enable_on_back_invoked_callback = True
        android.version_code = 2
        android.debug = 0
        android.release = 1
        EOF
    - name: Create initial json files
      run: |
        mkdir -p data
        
        cat > data/definitions.json << 'EOF'
        {
          "agents": [],
          "routes": [],
          "customers": []
        }
        EOF
        
        cat > data/settings.json << 'EOF'
        {
          "supervision_rate": 0.3,
          "conversion_rate": 0.25,
          "avg_invoice_amount": 1000000,
          "target_amount": 50000000,
          "target_count": 100,
          "target_invoice_count": 20,
          "target_customer_count": 50,
          "target_new_customer_count": 10,
          "target_cash_sales": 30000000,
          "target_credit_sales": 20000000,
          "work_start_time": "08:00",
          "first_visit_time": "09:00",
          "min_daily_hours": 6,
          "first_customer_of_route": ""
        }
        EOF
        
        cat > data/users.json << 'EOF'
        {
          "users": []
        }
        EOF
        
        cat > data/codes.json << 'EOF'
        {
          "codes": []
        }
        EOF
        
        cat > data/admin_password.json << 'EOF'
        {
          "hashed_password": ""
        }
        EOF
        
        cat > data/daily_log.json << 'EOF'
        {}
        EOF
    - name: Copy fonts, data and android resources to build directory
      run: |
        mkdir -p .buildozer/android/app/fonts
        mkdir -p .buildozer/android/app/data
        mkdir -p .buildozer/android/app/android/res/xml
        
        cp -v fonts/*.ttf .buildozer/android/app/fonts/ 2>/dev/null || echo "⚠️ No fonts"
        cp -v data/*.json .buildozer/android/app/data/ 2>/dev/null || echo "⚠️ No data"
        cp -v android/res/xml/file_paths.xml .buildozer/android/app/android/res/xml/ 2>/dev/null || echo "⚠️ No file_paths.xml"
    - name: Update version and version_code
      run: |
        sed -i "s/android.version_code = [0-9]*/android.version_code = ${{ github.run_number }}/" buildozer.spec
        sed -i "s/version = .*/version = ${{ github.run_number }}/" buildozer.spec
        echo "✅ Version set to: ${{ github.run_number }}"
    - name: Restore Keystore from Secrets
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        mkdir -p .buildozer/android/platform/
        cp keystore.jks .buildozer/android/platform/planandroid.keystore
        echo "✅ Keystore restored successfully"
    - name: Update buildozer.spec with keystore paths
      run: |
        echo "" >> buildozer.spec
        echo "# Keystore configuration" >> buildozer.spec
        echo "android.keystore = planandroid.keystore" >> buildozer.spec
        echo "android.keystore_password = ${{ secrets.KEYSTORE_PASSWORD }}" >> buildozer.spec
        echo "android.keystore_alias = ${{ secrets.KEY_ALIAS }}" >> buildozer.spec
        echo "android.keystore_alias_password = ${{ secrets.KEY_PASSWORD }}" >> buildozer.spec
        echo "✅ buildozer.spec updated with keystore info"
    - name: Build with Buildozer
      run: |
        echo "y" | buildozer -v android release
      env:
        CC: gcc
        CXX: g++
        LD: g++

    - name: Convert AAB to Signed APK
      run: |
        AAB_FILE=$(find . -name "*.aab" -type f | head -n 1)
        if [ -f "$AAB_FILE" ]; then
          echo "📦 Found AAB: $AAB_FILE"
          
          wget -q https://github.com/google/bundletool/releases/download/1.17.0/bundletool-all-1.17.0.jar -O bundletool.jar
          
          java -jar bundletool.jar build-apks \
            --bundle="$AAB_FILE" \
            --output=app.apks \
            --mode=universal \
            --ks=keystore.jks \
            --ks-pass=pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias=${{ secrets.KEY_ALIAS }} \
            --key-pass=pass:${{ secrets.KEY_PASSWORD }} \
            --overwrite
          
          unzip -o app.apks -d apk_output
          mkdir -p bin
          cp apk_output/universal.apk bin/app-release.apk
          echo "✅ APK created successfully"
        else
          echo "⚠️ No AAB file found, checking for APK..."
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          if [ -f "$APK_FILE" ]; then
            mkdir -p bin
            cp "$APK_FILE" bin/app-release.apk
            echo "✅ APK found and copied"
          else
            echo "❌ No APK or AAB file found!"
            exit 1
          fi
        fi
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
