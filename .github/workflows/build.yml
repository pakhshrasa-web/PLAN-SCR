name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev \
          libfreetype6-dev libjpeg-dev \
          zlib1g-dev libltdl-dev \
          ccache wget

    - name: Install Buildozer
      run: |
        pip install buildozer cython==0.29.37

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = PlanAndroid
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf,json

        version = 1.0.0

        requirements = python3,kivy==2.3.0,openpyxl,plyer,arabic-reshaper,python-bidi,Pillow

        orientation = portrait
        fullscreen = 1

        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
        android.enable_androidx = True
        android.allow_backup = True

        android.add_src = fonts/

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

        echo "✅ buildozer.spec created"

    - name: Create JSON files
      run: |
        mkdir -p data
        
        echo '{"agents": [], "routes": [], "customers": []}' > data/definitions.json
        echo '{"supervision_rate": 0.3, "conversion_rate": 0.25, "avg_invoice_amount": 1000000, "target_amount": 50000000, "target_count": 100, "target_invoice_count": 20, "target_customer_count": 50, "target_new_customer_count": 10, "target_cash_sales": 30000000, "target_credit_sales": 20000000, "work_start_time": "08:00", "first_visit_time": "09:00", "min_daily_hours": 6, "first_customer_of_route": ""}' > data/settings.json
        echo '{"users": []}' > data/users.json
        echo '{"codes": []}' > data/codes.json
        echo '{"hashed_password": ""}' > data/admin_password.json
        echo '{}' > data/daily_log.json
        
        echo "✅ JSON files created"

    - name: Build APK
      run: |
        echo "y" | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
        retention-days: 7
        if-no-files-found: error
